name: Release build for macOS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            deployment_target: "11.0"
            dmg_suffix: arm64
          - arch: x86_64
            runner: macos-13
            deployment_target: "10.15"
            dmg_suffix: intel

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          brew update
          brew install cmake

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build-macos" >> "$GITHUB_OUTPUT"
          PROJECT_VERSION=$(grep -E "^project\(solar_system VERSION" CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          echo "project-version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deployment_target }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Create Application Bundle
        run: |
          APP_NAME="Solar System"
          BUNDLE_DIR="${APP_NAME}.app"
          mkdir -p "${BUNDLE_DIR}/Contents/MacOS"
          mkdir -p "${BUNDLE_DIR}/Contents/Resources"

          # Copy binary from project root bin (standardized output)
          if [ -f "bin/solar_system" ]; then
            cp bin/solar_system "${BUNDLE_DIR}/Contents/MacOS/${APP_NAME}"
          elif [ -f "${{ steps.strings.outputs.build-output-dir }}/bin/solar_system" ]; then
            cp ${{ steps.strings.outputs.build-output-dir }}/bin/solar_system "${BUNDLE_DIR}/Contents/MacOS/${APP_NAME}"
          else
            echo "::error::Binary not found in bin/ or build-macos/bin/"
            exit 1
          fi
          chmod +x "${BUNDLE_DIR}/Contents/MacOS/${APP_NAME}"

          # Copy assets
          cp -rv resources/* "${BUNDLE_DIR}/Contents/Resources/"
          cp -rv src/shaders "${BUNDLE_DIR}/Contents/Resources/"

          # Icon
          if command -v iconutil >/dev/null 2>&1; then
            mkdir -p "icon.iconset"
            cp packaging/solar-system.png "icon.iconset/icon_512x512.png"
            iconutil -c icns "icon.iconset" -o "${BUNDLE_DIR}/Contents/Resources/AppIcon.icns"
            rm -rf "icon.iconset"
            ICON_FILE="AppIcon.icns"
          else
            cp packaging/solar-system.png "${BUNDLE_DIR}/Contents/Resources/AppIcon.png"
            ICON_FILE="AppIcon.png"
          fi

          # Info.plist
          CURRENT_YEAR=$(date +%Y)
          cp packaging/Info.plist "${BUNDLE_DIR}/Contents/Info.plist"
          sed -i '' "s/{{VERSION}}/${{ steps.strings.outputs.project-version }}/g" "${BUNDLE_DIR}/Contents/Info.plist"
          sed -i '' "s/{{YEAR}}/${CURRENT_YEAR}/g" "${BUNDLE_DIR}/Contents/Info.plist"
          sed -i '' "s/{{DEPLOYMENT_TARGET}}/${{ matrix.deployment_target }}/g" "${BUNDLE_DIR}/Contents/Info.plist"
          sed -i '' "s/{{ICON_NAME}}/${ICON_FILE}/g" "${BUNDLE_DIR}/Contents/Info.plist"

      - name: Create DMG
        run: |
          mkdir -p dmg-root
          cp -R "Solar System.app" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "Solar System" -srcfolder dmg-root -ov -format UDZO solar-system-macos-${{ matrix.dmg_suffix }}.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-system-macos-${{ matrix.dmg_suffix }}
          path: solar-system-macos-${{ matrix.dmg_suffix }}.dmg

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.strings.outputs.project-version }}
          name: Solar System v${{ steps.strings.outputs.project-version }}
          draft: false
          prerelease: false
          files: solar-system-macos-${{ matrix.dmg_suffix }}.dmg
