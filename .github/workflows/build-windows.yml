name: Build on Windows

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set reusable strings
        id: strings
        shell: pwsh
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> $env:GITHUB_OUTPUT
          $versionLine = Get-Content CMakeLists.txt | Select-String -Pattern "project\(solar_system VERSION ([0-9.]+)"
          if ($versionLine -match "VERSION ([0-9.]+)") {
              $PROJECT_VERSION = $matches[1]
          } else {
              $PROJECT_VERSION = "0.0.0"
          }
          echo "project-version=$PROJECT_VERSION" >> $env:GITHUB_OUTPUT

          $vComma = $PROJECT_VERSION -replace '\.', ','
          if ($vComma.Split(',').Count -lt 4) { $vComma += ",0" }
          echo "project-version-comma=$vComma" >> $env:GITHUB_OUTPUT
          echo "current-year=$(Get-Date -Format yyyy)" >> $env:GITHUB_OUTPUT

      - name: Prepare Windows Resources
        shell: pwsh
        run: |
          $rcContent = Get-Content packaging/windows.rc
          $rcContent = $rcContent -replace '{{VERSION}}', "${{ steps.strings.outputs.project-version }}"
          $rcContent = $rcContent -replace '{{VERSION_COMMA}}', "${{ steps.strings.outputs.project-version-comma }}"
          $rcContent = $rcContent -replace '{{YEAR}}', "${{ steps.strings.outputs.current-year }}"
          $rcContent | Set-Content packaging/windows_processed.rc

          if (-not (Test-Path "packaging/solar-system.ico")) {
            Copy-Item "packaging/solar-system.png" "packaging/solar-system.ico"
          }

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=cl
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_WIN32_RESOURCES=ON
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-system-windows
          path: build/bin/Release/solar_system.exe
