name: Release universal AppImage for Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-universal-appimage:
    name: Build Universal AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libwayland-cursor0 \
            libwayland-egl1-mesa \
            libxkbcommon-dev \
            libdecor-0-dev \
            libdecor-0-0 \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxcursor-dev \
            wget

      - name: Install AppImage tools
        run: |
          wget -q -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build-universal" >> "$GITHUB_OUTPUT"
          PROJECT_VERSION=$(grep -E "^project\(solar_system VERSION" CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          echo "project-version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          cmake -B ${{ steps.strings.outputs.build-output-dir }} \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Release \
            -DGLFW_BUILD_WAYLAND=ON \
            -DGLFW_BUILD_X11=ON \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/solar-system

          # Copy binary from project root bin (standardized output)
          if [ -f "bin/solar_system" ]; then
            cp bin/solar_system AppDir/usr/bin/solar_system
          elif [ -f "${{ steps.strings.outputs.build-output-dir }}/bin/solar_system" ]; then
            cp ${{ steps.strings.outputs.build-output-dir }}/bin/solar_system AppDir/usr/bin/solar_system
          else
            echo "::error::Binary not found in bin/ or build-universal/bin/"
            exit 1
          fi
          chmod +x AppDir/usr/bin/solar_system

          # Copy assets
          cp -rv resources/* AppDir/usr/share/solar-system/
          cp -rv src/shaders AppDir/usr/share/solar-system/

          # Desktop entry and icon
          cp packaging/solar-system.desktop AppDir/usr/share/applications/solar-system.desktop
          cp packaging/solar-system.png AppDir/usr/share/icons/hicolor/256x256/apps/solar-system.png

          # AppRun script for display server detection
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export XDG_DATA_DIRS="${HERE}/usr/share:${XDG_DATA_DIRS}"
          export SOLAR_SYSTEM_RESOURCE_PATH="${HERE}/usr/share/solar-system"

          WAYLAND_DETECTED=false
          X11_DETECTED=false

          if [ -n "$WAYLAND_DISPLAY" ] || [ "$XDG_SESSION_TYPE" = "wayland" ]; then
            WAYLAND_DETECTED=true
          fi

          if [ -n "$DISPLAY" ] || [ "$XDG_SESSION_TYPE" = "x11" ]; then
            X11_DETECTED=true
          fi

          if [ "$WAYLAND_DETECTED" = true ]; then
            echo "Targeting Wayland"
            export GDK_BACKEND=wayland
            export QT_QPA_PLATFORM=wayland
            export SDL_VIDEODRIVER=wayland
          else
            echo "Targeting X11"
            export GDK_BACKEND=x11
            export QT_QPA_PLATFORM=xcb
            export SDL_VIDEODRIVER=x11
          fi

          exec "${HERE}/usr/bin/solar_system" "$@"
          EOF
          chmod +x AppDir/AppRun

          ln -sf usr/share/applications/solar-system.desktop AppDir/solar-system.desktop
          ln -sf usr/share/icons/hicolor/256x256/apps/solar-system.png AppDir/solar-system.png

      - name: Create AppImage
        run: |
          ./linuxdeploy --appdir AppDir --output appimage
          mv *.AppImage solar-system-linux-universal.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-system-appimage
          path: solar-system-linux-universal.AppImage

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.strings.outputs.project-version }}
          name: Solar System v${{ steps.strings.outputs.project-version }}
          draft: false
          prerelease: false
          files: solar-system-linux-universal.AppImage
